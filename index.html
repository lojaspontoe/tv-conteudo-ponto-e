<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV Ponto E</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #tela {
      width: 100vh;
      height: 100vw;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(270deg);
    }
    #player-imagem, #player-video {
      width: 100%; height: 100%;
      object-fit: contain;
      background: #000;
      display: none;
    }
    #status-overlay {
      position: fixed; inset: 0; background: #000;
      display: flex; align-items: center; justify-content: center; z-index: 10;
    }
    #status-texto {
      color: #fff; font-family: sans-serif; font-size: 1.5rem;
      text-align: center; padding: 2rem;
    }
    #overlay-bloqueio { position: fixed; inset: 0; z-index: 20; cursor: none; }

    #btn-fullscreen {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 30;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.4);
      color: #fff;
      font-size: 1.1rem;
      font-family: sans-serif;
      padding: 14px 24px;
      border-radius: 12px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: opacity 0.4s;
    }
    #btn-fullscreen:hover { background: rgba(255,255,255,0.25); }
    #btn-fullscreen.oculto { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div id="tela">
    <img id="player-imagem" alt="" />
    <video id="player-video" muted playsinline preload="auto"></video>
  </div>
  <div id="status-overlay">
    <p id="status-texto">Carregando...</p>
  </div>
  <div id="overlay-bloqueio"></div>

  <button id="btn-fullscreen" onclick="entrarTelaCheia()">⛶ Tela cheia</button>

  <script>
    function entrarTelaCheia() {
      document.documentElement.requestFullscreen().then(() => {
        const btn = document.getElementById('btn-fullscreen');
        btn.classList.add('oculto');
      }).catch(() => {});
    }
    // Se sair da tela cheia, mostra o botão novamente
    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) {
        document.getElementById('btn-fullscreen').classList.remove('oculto');
      }
    });
  </script>

  <script src="config.js"></script>
  <script src="player.js"></script>
</body>
</html>
