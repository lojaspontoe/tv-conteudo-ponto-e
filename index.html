<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV Ponto E</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #tela {
      width: 100vh;
      height: 100vw;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(270deg);
    }
    #player-imagem, #player-video {
      width: 100%; height: 100%;
      object-fit: contain;
      background: #000;
      display: none;
    }
    #status-overlay {
      position: fixed; inset: 0; background: #000;
      display: flex; align-items: center; justify-content: center; z-index: 10;
    }
    #status-texto {
      color: #fff; font-family: sans-serif; font-size: 1.5rem;
      text-align: center; padding: 2rem;
    }
    #overlay-bloqueio { position: fixed; inset: 0; z-index: 20; cursor: none; }
  </style>
</head>
<body>
  <div id="tela">
    <img id="player-imagem" alt="" />
    <video id="player-video" muted playsinline preload="auto"></video>
  </div>
  <div id="status-overlay">
    <p id="status-texto">Carregando...</p>
  </div>
  <div id="overlay-bloqueio"></div>
  <script src="config.js"></script>
  <script src="player.js"></script>
</body>
</html>
